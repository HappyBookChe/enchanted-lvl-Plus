<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELP - Minecraft Bedrock Enchanted lvl Plus</title>
    <meta name="description" content="A useful add-on pack for Minecraft: Bedrock Edition">
    
    <!-- 本地favicon图标 -->
    <link rel="icon" href="./png/favicon.png" type="image/png">

    <style>
        :root {
            --green: #4FB364;
            --blue: #7289DA;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: white;
            padding: 1rem;
            min-height: 100vh;
        }

        main {
            min-height: calc(100vh - 2rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            line-height: 1.5;
            font-size: 1.5rem;
            text-align: center;
        }

        .banner {
            max-width: 100%;
            height: 250px;
            object-fit: contain;
        }

        .actions {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .actions a {
            padding: 1.5rem;
            width: 70%;
            max-width: 12rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            font-size: 1.25rem;
            border-radius: 10px;
            transition: transform 0.15s ease-out;
        }

        .actions a:hover {
            transform: translateY(-0.5rem);
        }

        /* 下载按钮 - 绿色背景 + 黑色文字/图标 */
        .download-btn {
            background-color: var(--green);
            color: black; /* 文字设为黑色 */
        }

        /* GitHub按钮 - 白色背景 + 黑色文字/图标（保持原有） */
        .github-btn {
            background-color: white;
            color: black;
        }

        svg {
            height: 22px;
            fill: currentColor; /* 图标颜色继承文字颜色 */
        }
    </style>
</head>
<body>
    <main>
        <img src="./png/banner.png" class="banner" alt="ENC+ Title" height="250">
        A useful add-on pack for Minecraft: Bedrock Edition.
